name: Build WOG App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - run: flutter pub get

      - run: flutter build web

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web