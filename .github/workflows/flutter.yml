name: Flutter APK Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"

      - name: Create Flutter Project
        run: flutter create app

      - name: Copy Source
        run: |
          cp -r lib app/
          cp pubspec.yaml app/

      - name: Build APK
        run: |
          cd app
          flutter pub get
          flutter build apk